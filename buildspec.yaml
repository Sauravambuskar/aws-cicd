version: 0.2

# NOTE:
# 1) REPOSITORY_URI should be your full ECR repository URI.
# 2) In imagedefinitions.json, the "name" value must match your ECS task definition container name.

phases:
  pre_build:
    commands:
      - mvn clean install
      - echo Logging in to Amazon ECR...
      - aws --version
      # ECR repository short name
      - ECR_REPOSITORY_NAME=javatechie-registry
      # ECR repository full URI (required for docker login/tag/push)
      - REPOSITORY_URI=185137893827.dkr.ecr.ap-south-1.amazonaws.com/javatechie-registry
      # CHANGE THIS: Must match ECS task definition container name (not ECR repo name)
      - ECS_CONTAINER_NAME=spring-app
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin $REPOSITORY_URI
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=build-$(echo $CODEBUILD_BUILD_ID | awk -F":" '{print $2}')
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker images...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Writing image definitions file...
      # Uses ECS container name + pushed image URI for ECS deploy stage
      - printf '[{"name":"%s","imageUri":"%s"}]' $ECS_CONTAINER_NAME $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - target/spring-app.jar
